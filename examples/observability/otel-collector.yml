receivers:
  prometheus/kstars:
    config:
      scrape_configs:
        - job_name: kstars-ekos
          scrape_interval: 10s
          metrics_path: /metrics
          static_configs:
            - targets: [127.0.0.1:9108]

processors:
  batch: {}

exporters:
  otlp/observability-backend:
    endpoint: otel-backend.example:4317
    tls:
      insecure: false

service:
  pipelines:
    metrics:
      receivers: [prometheus/kstars]
      processors: [batch]
      exporters: [otlp/observability-backend]
